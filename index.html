<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker (PUNYA YUDHA PRADIPTA)</title>

<link rel="stylesheet" href="style.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>
<body>

<!-- WARNING -->
<div id="warning-banner"></div>

<!-- HERO HEADER -->

<section class="hero-header">

    <div class="hero-left">

        <h1>
            Expense Tracker
        </h1>

        <p>
            Track spending, manage budgets,
            and visualize your financial activity
            in real time.
        </p>

    </div>

    <div class="hero-balance">

        <span>Total Balance</span>

        <h2 id="balance-display">
            $0.00
        </h2>

    </div>

</section>

<!-- SUMMARY -->

<section class="summary-section">

    <div class="summary-card">

        <i class="fa-solid fa-money-bill-wave"></i>

        <div>

            <span>Total Expenses</span>

            <h2 id="summary-total">
                $0.00
            </h2>

        </div>

    </div>

    <div class="summary-card">

        <i class="fa-solid fa-receipt"></i>

        <div>

            <span>Transactions</span>

            <h2 id="summary-count">
                0
            </h2>

        </div>

    </div>

    <div class="summary-card">

        <i class="fa-solid fa-chart-pie"></i>

        <div>

            <span>Top Category</span>

            <h2 id="summary-category">
                -
            </h2>

        </div>

    </div>

</section>

<!-- MAIN DASHBOARD -->

<div class="dashboard-grid">

    <!-- LEFT SIDE -->

    <div class="left-column">

        <!-- ADD EXPENSE -->

        <div class="card">

            <div class="card-title">

                <i class="fa-solid fa-plus"></i>

                <span>Add Expense</span>

            </div>

            <form id="transaction-form">

                <div class="input-group">

                    <label>
                        Item Name
                    </label>

                    <input
                    type="text"
                    id="item-name"
                    placeholder="Example: Pizza">

                    <small
                    class="field-error"
                    id="item-name-error">
                    </small>

                </div>

                <div class="input-group">

                    <label>
                        Amount ($)
                    </label>

                    <input
                    type="number"
                    id="amount"
                    placeholder="0.00">

                    <small
                    class="field-error"
                    id="amount-error">
                    </small>

                </div>

                <div class="input-group">

                    <label>
                        Category
                    </label>

                    <select id="category">

                        <option value="">
                            Select Category
                        </option>

                        <option value="Food">
                            🍔 Food
                        </option>

                        <option value="Transport">
                            🚗 Transport
                        </option>

                        <option value="Fun">
                            🎮 Fun
                        </option>

                    </select>

                    <small
                    class="field-error"
                    id="category-error">
                    </small>

                </div>

                <div class="input-group">

                    <label>
                        Monthly Budget
                    </label>

                    <input
                    type="number"
                    id="budget-limit"
                    placeholder="500">

                </div>

                <button
                type="submit"
                class="btn-primary">

                    <i class="fa-solid fa-plus"></i>

                    Add Transaction

                </button>

            </form>

            <!-- BUDGET -->

            <div class="budget-box">

                <div class="budget-title">

                    <span>
                        Budget Usage
                    </span>

                    <span id="budget-percent">
                        0%
                    </span>

                </div>

                <progress
                id="budget-progress"
                value="0"
                max="100">
                </progress>

            </div>

        </div>

        <!-- CHART -->

        <div class="card">

            <div class="card-title">

                <i class="fa-solid fa-chart-pie"></i>

                <span>
                    Spending Analytics
                </span>

            </div>

            <div class="chart-container">

                <canvas
                id="spending-chart"
                width="400"
                height="350">
                </canvas>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-column">

        <div class="card">

            <div class="history-header">

                <div class="card-title">

                    <i class="fa-solid fa-clock-rotate-left"></i>

                    <span>
                        Transaction History
                    </span>

                </div>

                <select id="sort-option">

                    <option value="latest">
                        Latest
                    </option>

                    <option value="amount-high">
                        Highest Amount
                    </option>

                    <option value="amount-low">
                        Lowest Amount
                    </option>

                    <option value="category">
                        Category
                    </option>

                </select>

            </div>

            <ul id="transaction-list">

                <li class="empty-state">

                    <i
                    class="fa-solid fa-wallet">
                    </i>

                    <p>
                        No expenses recorded yet
                    </p>

                </li>

            </ul>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
